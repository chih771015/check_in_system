version: "3.8"

# 覆蓋 docker-compose.yml 中的 frontend service，
# 換成適合對外穿透的 nginx 設定（真實 IP 透傳、X-Forwarded-Proto: https）。
#
# 使用方式：
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.expose.yml up -d --build

services:
  frontend:
    volumes:
      - ./nginx.expose.conf:/etc/nginx/conf.d/default.conf:ro
